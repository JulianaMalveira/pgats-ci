image: mcr.microsoft.com/playwright:v1.47.2-jammy

stages:
  - test
  - e2e

cache:
  paths:
    - node_modules/

unit_tests:
  stage: test
  script:
    - yarn install
    - yarn test

  artifacts:
    when: always
    paths:
      - reports/coverage/
    expire_in: 30 days

e2e_tests:
  stage: e2e
  script:
    - yarn install
    - yarn playwright test

  artifacts:
    when: always
    paths:
      - playwright-report/
      - test-results/
    expire_in: 30 days

  retry:
    max: 1
